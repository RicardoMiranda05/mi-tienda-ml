<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda ML</title>
<meta name="description" content="Productos seleccionados con links directos a MercadoLibre">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FFE600;
    --blue:   #3483FA;
    --bg:     #0D0D0D;
    --s1:     #181818;
    --s2:     #222222;
    --border: #2C2C2C;
    --text:   #F0F0F0;
    --muted:  #777;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 60px;
    background: rgba(13,13,13,.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 9px; text-decoration: none; }
  .logo-badge {
    background: var(--yellow); color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem; letter-spacing: 1px;
    padding: 3px 9px; border-radius: 4px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; letter-spacing: 2px; color: var(--text);
  }
  .admin-link {
    font-size: .78rem; color: var(--muted);
    text-decoration: none; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    transition: all .15s;
  }
  .admin-link:hover { color: var(--text); border-color: var(--muted); }

  /* HERO */
  .hero {
    max-width: 860px; margin: 0 auto;
    padding: 3.5rem 2rem 1.5rem;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 8vw, 5.5rem);
    line-height: .95; letter-spacing: 2px;
  }
  .hero h1 em { color: var(--yellow); font-style: normal; }
  .hero p { margin-top: .9rem; color: var(--muted); font-size: .95rem; max-width: 420px; line-height: 1.6; }

  /* STATS */
  .stats {
    max-width: 860px; margin: 1.5rem auto 0;
    padding: 0 2rem;
    display: flex; gap: 2rem;
  }
  .stat strong { display: block; font-size: 1.2rem; color: var(--yellow); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .stat span { font-size: .78rem; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }

  /* TOOLBAR */
  .toolbar {
    max-width: 860px; margin: 2rem auto 0;
    padding: 0 2rem;
    display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
  }
  .chip {
    padding: 5px 13px; border-radius: 99px; font-size: .8rem; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--muted); transition: all .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .chip.active { background: var(--yellow); color: #000; border-color: var(--yellow); }
  .search {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    background: var(--s1); border: 1px solid var(--border);
    border-radius: 99px; padding: 5px 14px;
  }
  .search input {
    background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: .85rem; width: 160px;
  }
  .search svg { opacity: .35; flex-shrink: 0; }

  /* GRID */
  .grid {
    max-width: 860px; margin: 1.5rem auto 5rem;
    padding: 0 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
    gap: 1rem;
  }

  /* CARD */
  .card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform .22s, box-shadow .22s;
    animation: up .28s ease both;
  }
  @keyframes up { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
  .card:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(0,0,0,.55); }

  .card-thumb {
    width: 100%; aspect-ratio: 16/9;
    object-fit: cover; display: block;
    background: var(--s2);
  }
  .card-no-img {
    width: 100%; aspect-ratio: 16/9;
    background: var(--s2);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem; color: var(--border);
  }
  .card-body { padding: .9rem 1rem; flex: 1; display: flex; flex-direction: column; gap: .4rem; }
  .card-cat { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--yellow); }
  .card-name {
    font-weight: 600; font-size: .94rem; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-desc {
    font-size: .8rem; color: var(--muted); line-height: 1.5; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-price {
    font-family: 'Bebas Neue', sans-serif; font-size: 1.55rem;
    color: var(--yellow); letter-spacing: 1px; margin-top: .2rem;
  }
  .card-foot {
    padding: .7rem 1rem;
    border-top: 1px solid var(--border);
  }
  .btn-buy {
    display: block; width: 100%;
    background: var(--blue); color: #fff;
    text-align: center; text-decoration: none;
    font-weight: 600; font-size: .88rem;
    font-family: 'DM Sans', sans-serif;
    padding: 9px; border-radius: 8px;
    transition: opacity .15s, transform .15s;
  }
  .btn-buy:hover { opacity: .85; transform: scale(.98); }

  /* EMPTY */
  .empty {
    grid-column: 1/-1; text-align: center;
    padding: 5rem 1rem; color: var(--muted);
  }
  .empty-icon { font-size: 3rem; opacity: .25; margin-bottom: 1rem; }

  /* LOADER */
  .loader {
    grid-column: 1/-1; text-align: center;
    padding: 5rem; color: var(--muted); font-size: .9rem;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    text-align: center; padding: 1.5rem;
    font-size: .78rem; color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="index.html">
    <div class="logo-badge">ML</div>
    <div class="logo-text">Mi Tienda</div>
  </a>
  <a class="admin-link" href="admin.html">⚙ Admin</a>
</header>

<div class="hero">
  <h1>Mis picks de<br><em>MercadoLibre</em></h1>
  <p>Productos que revisé y recomiendo. Links directos para que compres sin rodeos.</p>
</div>

<div class="stats">
  <div class="stat"><strong id="s-total">—</strong><span>productos</span></div>
  <div class="stat"><strong id="s-cats">—</strong><span>categorías</span></div>
</div>

<div class="toolbar" id="toolbar">
  <button class="chip active" onclick="filter('all',this)">Todos</button>
  <div class="search">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" placeholder="Buscar producto…" oninput="search(this.value)">
  </div>
</div>

<div class="grid" id="grid">
  <div class="loader">Cargando productos…</div>
</div>

<footer>Hecho con ❤️ · <a href="admin.html" style="color:var(--muted)">Administrar</a></footer>

<script>
let all = [], active = 'all', q = '';

async function load() {
  try {
    const r = await fetch('products.json?v=' + Date.now());
    all = await r.json();
  } catch { all = []; }
  render();
}

function render() {
  let list = [...all];
  if (active !== 'all') list = list.filter(p => p.cat === active);
  if (q) { const lq = q.toLowerCase(); list = list.filter(p => (p.name+p.desc+p.cat).toLowerCase().includes(lq)); }

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🛍️</div><p>${q ? 'Sin resultados.' : 'Próximamente…'}</p></div>`;
  } else {
    list.forEach((p,i) => {
      const c = document.createElement('div');
      c.className = 'card';
      c.style.animationDelay = (i * 40) + 'ms';
      c.innerHTML = `
        ${p.img ? `<img class="card-thumb" src="${esc(p.img)}" alt="${esc(p.name)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="card-no-img" style="${p.img?'display:none':''}">🛒</div>
        <div class="card-body">
          ${p.cat ? `<div class="card-cat">${esc(p.cat)}</div>` : ''}
          <div class="card-name">${esc(p.name)}</div>
          ${p.desc ? `<div class="card-desc">${esc(p.desc)}</div>` : ''}
          ${p.price ? `<div class="card-price">${esc(p.price)}</div>` : ''}
        </div>
        <div class="card-foot">
          <a class="btn-buy" href="${esc(p.url)}" target="_blank" rel="noopener">Ver en MercadoLibre →</a>
        </div>`;
      grid.appendChild(c);
    });
  }

  // stats
  const cats = [...new Set(all.map(p=>p.cat).filter(Boolean))];
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-cats').textContent = cats.length;

  // chips
  const toolbar = document.getElementById('toolbar');
  toolbar.querySelectorAll('.chip:not(:first-child)').forEach(el=>el.remove());
  cats.forEach(cat => {
    const b = document.createElement('button');
    b.className = 'chip' + (active===cat?' active':'');
    b.textContent = cat;
    b.onclick = () => filter(cat, b);
    toolbar.insertBefore(b, toolbar.querySelector('.search'));
  });
}

function filter(cat, el) {
  active = cat;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function search(v) { q = v; render(); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

load();
</script>
</body>
</html>
